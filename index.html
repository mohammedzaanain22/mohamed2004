<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h2>Shopping Store</h2>
        <a href="cart.html" class="cart">
            🛒 Cart (<span id="cartCount">0</span>)
        </a>
    </header>

    <section class="allcards">

        <div class="card">

            <img src="phone-1.jpg" alt="Phone">

            <div class="title">
                <h3>Phone</h3>

                <p class="price">500</p>

                <input type="number" class="qty" value="1" min="1">

                <button onclick="addToCart(this)">
                    Add To Cart
                </button>

            </div>

        </div>

        <div class="card">

            <img src="cloth-3.jpg" alt="Clothes">

            <div class="title">
                <h3>Clothes</h3>

                <p class="price">150</p>

                <input type="number" class="qty" value="1" min="1">

                <button onclick="addToCart(this)">
                    Add To Cart
                </button>

            </div>

        </div>

        <div class="card">

            <img src="cloth-2.jpg" alt="Shoes">

            <div class="title">
                <h3>Shoes</h3>

                <p class="price">300</p>

                <input type="number" class="qty" value="1" min="1">

                <button onclick="addToCart(this)">
                    Add To Cart
                </button>

            </div>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
